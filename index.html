<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫码测试</title>
    <!-- 使用海外最稳定的 Cloudflare CDN -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        #reader { width: 100%; max-width: 500px; margin: 0 auto; background: #f0f0f0; }
        #scan-result { color: #007bff; word-break: break-all; }
    </style>
</head>
<body>

    <h2>扫码测试</h2>
    <div id="reader"></div>
    <p>扫描结果: <strong id="scan-result">等待扫码...</strong></p>

    <script>
        function onScanSuccess(decodedText, decodedResult) {
            document.getElementById('scan-result').textContent = decodedText;
        }

        function onScanFailure(error) {
            // 忽略频繁的扫描失败日志
        }

        // 确保库加载后再初始化
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof Html5QrcodeScanner !== 'undefined') {
                let html5QrcodeScanner = new Html5QrcodeScanner(
                    "reader", { fps: 10, qrbox: { width: 250, height: 250 } }, false
                );
                html5QrcodeScanner.render(onScanSuccess, onScanFailure);
            } else {
                document.getElementById('scan-result').textContent = "错误：扫码库加载失败，请检查网络或更换CDN！";
            }
        });
    </script>
</body>
</html>
