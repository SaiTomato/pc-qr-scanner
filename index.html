<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>扫码测试</title>

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <style>

        body {
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
            text-align: center;
            background: #f5f5f5;
        }

        h2 {
            margin-bottom: 20px;
        }

        #reader {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }

        #scan-result {
            margin-top: 20px;
            font-size: 20px;
            color: #007bff;
            word-break: break-all;
        }

    </style>
</head>

<body>

    <h2>二维码扫码测试</h2>

    <div id="reader"></div>

    <div id="scan-result">
        等待扫码...
    </div>

    <script>

        // =========================
        // CONFIG
        // =========================

        const GAS_URL =
        "https://script.google.com/macros/s/AKfycbxgp00JvxJWpSSTlrabL4Hqxe0j9Ue01Gexs4z2sRk/dev";

        function onScanSuccess(decodedText) {

            document.getElementById(
                'scan-result'
            ).innerHTML =
                '扫描结果：<br><strong>' +
                decodedText +
                '</strong>';

            console.log(decodedText);

            
            // REDIRECT
            setTimeout(() => {

                window.location.href =

                GAS_URL

                + "?page=pcDetail"

                + "&pc_number="

                + encodeURIComponent(
                    decodedText
                    );

            }, 1000);
        }

        function onScanFailure(error) {
        }

        window.addEventListener(
            'load',
            () => {

                const scanner =
                    new Html5QrcodeScanner(
                        "reader",
                        {

                            fps: 15,

                            // 重点：扩大识别区域
                            qrbox: function(
                                viewfinderWidth,
                                viewfinderHeight
                            ) {

                                let minEdge =
                                    Math.min(
                                        viewfinderWidth,
                                        viewfinderHeight
                                    );

                                let qrSize =
                                    Math.floor(
                                        minEdge * 0.8
                                    );

                                return {
                                    width: qrSize,
                                    height: qrSize
                                };
                            },

                            rememberLastUsedCamera: true,

                            showTorchButtonIfSupported: true,

                            showZoomSliderIfSupported: true,

                            supportedScanTypes: [
                                Html5QrcodeScanType
                                    .SCAN_TYPE_CAMERA
                            ]
                        },
                        false
                    );

                scanner.render(
                    onScanSuccess,
                    onScanFailure
                );
            }
        );

    </script>

</body>
</html>
