<!DOCTYPE html>

<html>

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>

    QR Scanner

  </title>

  <!-- BOOTSTRAP -->

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <!-- QR LIBRARY -->

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>

    body{

      background:#f8f9fa;

    }

    #reader{

      width:100%;

    }

  </style>

</head>

<body>

  <div class="container py-4">

    <!-- TITLE -->

    <div class="text-center mb-4">

      <h2>

        QR読取

      </h2>

      <p class="text-muted">

        PC QRコードをスキャンしてください

      </p>

    </div>

    <!-- QR CARD -->

    <div class="card shadow-sm">

      <div class="card-body">

        <!-- CAMERA -->

        <div id="reader">

        </div>

        <!-- STATUS -->

        <div
          id="statusMessage"
          class="alert alert-secondary mt-3 text-center"
        >

          カメラ起動待機中

        </div>

      </div>

    </div>

  </div>

  <script>

    // =========================
    // CONFIG
    // =========================

    const GAS_URL =

      "https://script.google.com/macros/s/AKfycbxgp00JvxJWpSSTlrabL4Hqxe0j9Ue01Gexs4z2sRk/dev";

    // =========================
    // START SCANNER
    // =========================

    const html5QrCode =

      new Html5Qrcode(
        "reader"
      );

    startScanner();

    // =========================
    // START
    // =========================

    function startScanner(){

      html5QrCode.start(

        {
          facingMode: "environment"
        },

        {
          fps: 20,
          qrbox: {
            width: 220,
            height: 220
          },
          aspectRatio: 1.0
        },

        onScanSuccess,

        onScanError

      );

    }

    // =========================
    // SUCCESS
    // =========================

    function onScanSuccess(decodedText){

      console.log(decodedText);

      document.getElementById(
        "statusMessage"
      ).className =

        "alert alert-success mt-3 text-center";

      document.getElementById(
        "statusMessage"
      ).innerText =

        "読取成功: " + decodedText;

      // STOP CAMERA

      html5QrCode.stop();

      // REDIRECT

      setTimeout(() => {

        window.location.href =

          GAS_URL

          + "?page=pcDetail"

          + "&pc_number="

          + encodeURIComponent(
              decodedText
            );

      }, 1000);

    }

    // =========================
    // ERROR
    // =========================

    function onScanError(error){

      // ignore realtime errors

    }

  </script>

</body>

</html>
