<!DOCTYPE html>
<html lang="zh-CN">
<body>
    <video id="webcam-video" style="width:100%; max-width:500px;"></video>
    <p>结果: <strong id="scan-result">等待扫码...</strong></p>
    <script type="module">
        import QrScanner from 'https://cloudflare.com/';
        const videoElem = document.getElementById('webcam-video');
        const resultElem = document.getElementById('scan-result');
        const scanner = new QrScanner(videoElem, result => resultElem.textContent = result.data, {
            highlightScanRegion: true,
            highlightCodeOutline: true,
        });
        scanner.start();
    </script>
</body>
</html>
